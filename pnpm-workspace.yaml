packages:
  - 'apps/*'
  - 'packages/*'
allowBuilds:
  '@nestjs/core': true
  '@parcel/watcher': true
  '@prisma/engines': true
  '@scarf/scarf': true
  '@swc/core': true
  argon2: true
  cpu-features: true
  esbuild: true
  msgpackr-extract: true
  prisma: true
  protobufjs: true
  sharp: true
  ssh2: true
  unrs-resolver: true
# Transitive security pins (force a patched version of a sub-dependency until its
# parent's range catches up). These MUST live here, not in package.json: pnpm 11
# silently ignores `pnpm.overrides` in package.json (settings moved to this file in
# pnpm 10.5+). Prune an entry once the parent ships the fix in range.
overrides:
  '@angular-devkit/core>picomatch': '4.0.4'
  '@nestjs/config>lodash': '4.18.1'
  '@swc/cli>minimatch': '9.0.9'
  # brace-expansion: patch the vulnerable v1 (<1.1.13) and v5 (<5.0.6) lines only.
  # Pin per-major — NOT a blanket `minimatch>brace-expansion`, which forces v5 onto
  # minimatch 3.x (needs the v1 API) → "expand is not a function". v2 has no advisory.
  'brace-expansion@1': '1.1.15'
  'brace-expansion@5': '5.0.6'
  'ajv>fast-uri': '3.1.2'
  'eslint-plugin-import>minimatch': '3.1.5'
  'eslint-plugin-jsx-a11y>minimatch': '3.1.5'
  'eslint-plugin-react>minimatch': '3.1.5'
  'fdir>picomatch': '4.0.4'
  'node-emoji>lodash': '4.18.1'
  'path-to-regexp': '8.4.2'
  # Reachable at runtime via @nestjs/terminus > @grpc/grpc-js (and dev via
  # testcontainers > dockerode). Stay on the 7.x line the parents require
  # (^7.5.3 / ^7.2.5); 7.6.3 patches alerts #105 (med) and #106 (high).
  'protobufjs': '7.6.3'
  # dev-only (testcontainers > dockerode); patched only in the 11.x line.
  'uuid@10': '11.1.1'
  'redis-info>lodash': '4.18.1'
  'rollup': '4.59.0'
  'tinyglobby>picomatch': '4.0.4'
  # dev-only (testcontainers > dockerode); 0.2.7 patches alert #104 (high).
  'tmp': '0.2.7'
  # @grpc/grpc-js + hono ship via @nestjs/terminus and the prisma CLI (@prisma/dev);
  # patched in place rather than trimmed from the image.
  '@grpc/grpc-js': '1.14.4'
  'hono': '4.12.21'
  '@hono/node-server': '1.19.13'
  # Scope to the vulnerable major so safe coexisting majors are left alone.
  'postcss@8': '8.5.14'
  'ws@8': '8.21.0'
  'ajv@8': '8.20.0'
  'qs@6': '6.15.2'
  # build-only (vite/tsup/tsx); advisory is a dev-server CORS issue, not shipped.
  'esbuild': '0.28.1'
  'vite': '7.3.2'
