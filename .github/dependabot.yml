# Dependabot: auto PRs for patch/minor, majors ignored (check with: pnpm outdated)
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates

version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 10
    groups:
      npm-non-major:
        applies-to: version-updates
        patterns:
          - '*'
        update-types:
          - 'patch'
          - 'minor'
    ignore:
      - dependency-name: '*'
        update-types: ['version-update:semver-major']
    commit-message:
      prefix: 'chore(deps)'
      include: 'scope'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 5
    groups:
      github-actions-non-major:
        applies-to: version-updates
        patterns:
          - '*'
        update-types:
          - 'patch'
          - 'minor'
    commit-message:
      prefix: 'ci'
