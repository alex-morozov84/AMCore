name: Security Scans

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '43 3 * * 1'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: 8.30.1
          GITLEAKS_LINUX_X64_SHA256: 551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
        run: |
          mkdir -p "$RUNNER_TEMP/bin"
          asset="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -fsSLo "$RUNNER_TEMP/$asset" \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${asset}"
          printf '%s  %s\n' "$GITLEAKS_LINUX_X64_SHA256" "$RUNNER_TEMP/$asset" | sha256sum -c -
          tar -xzf "$RUNNER_TEMP/$asset" -C "$RUNNER_TEMP"
          install "$RUNNER_TEMP/gitleaks" "$RUNNER_TEMP/bin/gitleaks"
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"

      - name: Scan push commit range
        if: github.event_name == 'push'
        env:
          GIT_BEFORE_SHA: ${{ github.event.before }}
          GIT_AFTER_SHA: ${{ github.sha }}
        run: |
          zero_sha='0000000000000000000000000000000000000000'
          range="$GIT_BEFORE_SHA..$GIT_AFTER_SHA"
          if [ "$GIT_BEFORE_SHA" = "$zero_sha" ] || ! git rev-parse --verify "$GIT_BEFORE_SHA^{commit}" >/dev/null 2>&1; then
            echo "Using push fallback full-history scan for $GIT_AFTER_SHA"
            gitleaks git --no-banner --no-color --redact=100 --timeout=600 \
              --log-opts="--all" .
            exit 0
          fi

          echo "Scanning push range $range"
          gitleaks git --no-banner --no-color --redact=100 --timeout=180 \
            --log-opts="$range" .

      - name: Scan pull request commit range
        if: github.event_name == 'pull_request'
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          gitleaks git --no-banner --no-color --redact=100 --timeout=180 \
            --log-opts="$PR_BASE_SHA..$PR_HEAD_SHA" .

      - name: Scan full git history
        if: github.event_name == 'schedule'
        run: |
          gitleaks git --no-banner --no-color --redact=100 --timeout=600 \
            --log-opts="--all" .

  osv:
    name: OSV scan
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Install OSV-Scanner
        env:
          OSV_SCANNER_VERSION: 2.3.8
          OSV_SCANNER_LINUX_AMD64_SHA256: bc98e15319ed0d515e3f9235287ba53cdc5535d576d24fd573978ecfe9ab92dc
        run: |
          mkdir -p "$RUNNER_TEMP/bin"
          asset="osv-scanner_linux_amd64"
          curl -fsSLo "$RUNNER_TEMP/$asset" \
            "https://github.com/google/osv-scanner/releases/download/v${OSV_SCANNER_VERSION}/${asset}"
          printf '%s  %s\n' "$OSV_SCANNER_LINUX_AMD64_SHA256" "$RUNNER_TEMP/$asset" | sha256sum -c -
          install -m 0755 "$RUNNER_TEMP/$asset" "$RUNNER_TEMP/bin/osv-scanner"
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"

      - name: Scan repository with OSV-Scanner
        run: |
          set +e
          osv-scanner scan --recursive --format sarif --output-file osv-results.sarif .
          status=$?
          set -e
          if [ "$status" -ne 0 ] && [ "$status" -ne 1 ]; then
            exit "$status"
          fi

      - name: Upload OSV SARIF
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          sarif_file: osv-results.sarif
          category: osv-scanner
