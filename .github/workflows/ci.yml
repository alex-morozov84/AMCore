name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm lint

      - name: Check formatting
        run: pnpm format:check

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run type check
        run: pnpm typecheck

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: |
          pnpm test
          pnpm --filter api test:e2e -- process-role.e2e-spec.ts shutdown-drain.e2e-spec.ts

  docker-image-smoke:
    name: Docker production image smoke
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build production runner image
        run: docker build -f apps/api/Dockerfile -t amcore-api:smoke .

      # Verify the self-contained production image (pnpm deploy bundle):
      # 1. native sharp/libvips loads AND encodes (not just require) — catches a
      #    missing/wrong native binary or broken codec the host platform hides;
      # 2. critical runtime deps resolve from the bundle's flat node_modules —
      #    proves the pnpm-workspace packaging is self-contained;
      # 3. the generated Prisma client is present;
      # 4. React email templates render from the production SWC output and
      #    pnpm deploy bundle (catches missing react/jsx-runtime/react-dom deps).
      # Runs as the image's non-root user from the production WORKDIR.
      - name: Smoke-test the built runner image
        run: |
          docker run --rm amcore-api:smoke node -e "
            const sharp = require('sharp');
            sharp({ create: { width: 8, height: 8, channels: 3, background: '#000' } })
              .webp()
              .toBuffer()
              .then((b) => {
                if (!b || b.length === 0) throw new Error('empty WebP buffer');
                console.log('sharp WebP encode OK:', b.length, 'bytes');
                for (const m of ['@nestjs/core', '@prisma/client', 'argon2', 'bullmq', 'nestjs-pino']) {
                  require.resolve(m);
                }
                console.log('runtime module resolution OK');
                if (typeof require('@prisma/client').PrismaClient !== 'function') {
                  throw new Error('Prisma client not generated');
                }
                console.log('Prisma client present OK');
                const { render } = require('@react-email/render');
                const { default: WelcomeEmail } = require('./dist/infrastructure/email/templates/welcome.js');
                return render(WelcomeEmail({ name: 'CI', appName: 'AMCore' }));
              })
              .then((html) => {
                if (!html.includes('CI')) throw new Error('email render output missing expected name');
                console.log('React email render OK:', html.length, 'bytes');
              })
              .catch((err) => {
                console.error('image smoke failed:', err);
                process.exit(1);
              });
          "
