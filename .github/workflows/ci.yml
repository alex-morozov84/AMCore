name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm lint

      - name: Check formatting
        run: pnpm format:check

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run type check
        run: pnpm typecheck

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: |
          pnpm test
          pnpm --filter api test:e2e -- process-role.e2e-spec.ts shutdown-drain.e2e-spec.ts

  docker-image-smoke:
    name: Docker production image smoke
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    permissions:
      actions: read
      contents: read
      security-events: write
    env:
      AMCORE_API_IMAGE: amcore-api:smoke
      AMCORE_API_MIGRATOR_IMAGE: amcore-api-migrator:smoke
      COMPOSE_FILE: docker-compose.yml:.github/compose.boot-smoke.override.yml
      COMPOSE_PROFILES: local-infra
      COMPOSE_PROJECT_NAME: amcore-smoke
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Trivy
        env:
          TRIVY_VERSION: 0.71.0
          TRIVY_LINUX_64BIT_SHA256: 30a3d22b23f88c233f1658f562fb477cae3b3e8b4761109d515b7698daf85814
        run: |
          mkdir -p "$RUNNER_TEMP/bin"
          asset="trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz"
          curl -fsSLo "$RUNNER_TEMP/$asset" \
            "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/${asset}"
          printf '%s  %s\n' "$TRIVY_LINUX_64BIT_SHA256" "$RUNNER_TEMP/$asset" | sha256sum -c -
          tar -xzf "$RUNNER_TEMP/$asset" -C "$RUNNER_TEMP/bin" trivy
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"

      - name: Build production runner image
        run: docker build -f apps/api/Dockerfile -t "$AMCORE_API_IMAGE" .

      - name: Build production migrator image
        run: docker build -f apps/api/Dockerfile --target migrator -t "$AMCORE_API_MIGRATOR_IMAGE" .

      - name: Smoke-test the migrator image
        run: |
          docker run --rm "$AMCORE_API_MIGRATOR_IMAGE" sh -lc '
            ./node_modules/.bin/prisma --version
            test -x ./node_modules/.bin/prisma
          '

      - name: Scan the built runner image with Trivy
        run: |
          trivy image \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --format sarif \
            --output trivy-results.sarif \
            "$AMCORE_API_IMAGE"

      - name: Upload Trivy SARIF
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4
        with:
          sarif_file: trivy-results.sarif
          category: trivy-image

      # Verify the self-contained production app image (pnpm deploy bundle):
      # 1. native sharp/libvips loads AND encodes (not just require) — catches a
      #    missing/wrong native binary or broken codec the host platform hides;
      # 2. critical runtime deps resolve from the bundle's flat node_modules —
      #    proves the pnpm-workspace packaging is self-contained;
      # 3. the compiled generated Prisma client is present while the Prisma CLI is absent;
      # 4. React email templates render from the production SWC output and
      #    pnpm deploy bundle (catches missing react/jsx-runtime/react-dom deps).
      # Runs as the image's non-root user from the production WORKDIR.
      - name: Smoke-test the built runner image
        run: |
          docker run --rm "$AMCORE_API_IMAGE" node -e "
            const sharp = require('sharp');
            sharp({ create: { width: 8, height: 8, channels: 3, background: '#000' } })
              .webp()
              .toBuffer()
              .then((b) => {
                if (!b || b.length === 0) throw new Error('empty WebP buffer');
                console.log('sharp WebP encode OK:', b.length, 'bytes');
                for (const m of ['@nestjs/core', '@prisma/client/runtime/client', 'argon2', 'bullmq', 'nestjs-pino']) {
                  require.resolve(m);
                }
                console.log('runtime module resolution OK');
                if (typeof require('./dist/generated/prisma/client.js').PrismaClient !== 'function') {
                  throw new Error('Prisma client not generated');
                }
                try {
                  require.resolve('prisma');
                  throw new Error('Prisma CLI unexpectedly present in app image');
                } catch (err) {
                  if (err.code !== 'MODULE_NOT_FOUND') throw err;
                }
                console.log('Prisma client present OK');
                const { render } = require('@react-email/render');
                const { default: WelcomeEmail } = require('./dist/infrastructure/email/templates/welcome.js');
                return render(WelcomeEmail({ name: 'CI', appName: 'AMCore' }));
              })
              .then((html) => {
                if (!html.includes('CI')) throw new Error('email render output missing expected name');
                console.log('React email render OK:', html.length, 'bytes');
              })
              .catch((err) => {
                console.error('image smoke failed:', err);
                process.exit(1);
              });
          "

      - name: Render compose config for boot smoke
        run: |
          docker compose config > "$RUNNER_TEMP/boot-smoke-compose.yml"
          ruby -e '
            require "yaml"
            config = YAML.load_file(ARGV[0])
            %w[api worker].each do |name|
              service = config.fetch("services").fetch(name)
              raise "#{name} build unexpectedly present" if service.key?("build")
              raise "#{name} image mismatch: #{service["image"]}" unless service["image"] == ENV.fetch("AMCORE_API_IMAGE")
            end
            migrate = config.fetch("services").fetch("migrate")
            raise "migrate build unexpectedly present" if migrate.key?("build")
            raise "migrate image mismatch: #{migrate["image"]}" unless migrate["image"] == ENV.fetch("AMCORE_API_MIGRATOR_IMAGE")
            puts "compose image override OK"
          ' "$RUNNER_TEMP/boot-smoke-compose.yml"

      - name: Boot the scanned image via docker compose
        run: docker compose up -d --build

      - name: Verify migrate, api, web, and worker
        run: |
          migrate_cid=""
          for attempt in $(seq 1 60); do
            migrate_cid="$(docker compose ps -aq migrate)"
            if [ -n "$migrate_cid" ]; then
              status="$(docker inspect -f '{{.State.Status}}' "$migrate_cid")"
              if [ "$status" = "exited" ]; then
                code="$(docker inspect -f '{{.State.ExitCode}}' "$migrate_cid")"
                if [ "$code" -ne 0 ]; then
                  echo "migrate exited with $code"
                  exit 1
                fi
                echo "migrate exit 0"
                break
              fi
            fi
            sleep 2
          done
          if [ -z "$migrate_cid" ]; then
            echo "migrate container not created"
            exit 1
          fi
          if [ "$(docker inspect -f '{{.State.Status}}' "$migrate_cid")" != "exited" ]; then
            echo "migrate did not finish in time"
            exit 1
          fi

          for attempt in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:5002/api/v1/health/ready > /dev/null; then
              echo "api ready 200"
              break
            fi
            if [ "$attempt" -eq 60 ]; then
              echo "api readiness check timed out"
              exit 1
            fi
            sleep 2
          done

          for attempt in $(seq 1 60); do
            status="$(curl -fsS -o /dev/null -w '%{http_code}' http://127.0.0.1:3000/ || true)"
            if [ "$status" = "200" ]; then
              echo "web 200"
              break
            fi
            if [ "$attempt" -eq 60 ]; then
              echo "web readiness check timed out"
              exit 1
            fi
            sleep 2
          done

          worker_cid=""
          for attempt in $(seq 1 60); do
            worker_cid="$(docker compose ps -q worker)"
            if [ -n "$worker_cid" ]; then
              health="$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' "$worker_cid")"
              if [ "$health" = "healthy" ]; then
                echo "worker healthy"
                exit 0
              fi
            fi
            sleep 2
          done
          echo "worker did not become healthy"
          exit 1

      - name: Dump compose logs on failure
        if: failure()
        run: |
          docker compose ps
          docker compose logs --no-color

      - name: Tear down boot smoke stack
        if: always()
        run: docker compose down -v
