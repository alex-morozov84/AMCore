# AMCore — reference full stack + the production migration contract (ADR-040).
#
# Default (.env has COMPOSE_PROFILES=local-infra):
#   docker compose up          → bundled Postgres + Redis start, the one-shot
#                                `migrate` service runs `migrate deploy` once,
#                                then api + web boot. Works out of the box.
#
# Remote DB / Redis / S3 (managed or VPS):
#   set COMPOSE_PROFILES= (empty) and COMPOSE_DATABASE_URL / COMPOSE_REDIS_URL /
#   STORAGE_DRIVER=s3 (+ creds) in .env → bundled Postgres/Redis are NOT started;
#   `required:false` makes the optional dependency skip. (The host DATABASE_URL /
#   REDIS_URL are for `pnpm dev` and do not affect this stack.)
#
# Requires Docker Compose v2.20.2+ (depends_on `required:false`,
# `service_completed_successfully`). Production hardening (sslmode, S3, real JWT
# secret >= 32 chars) is documented in docs/operations/deployment.md.
#
# The `api` (web role) and `worker` (worker role) run the SAME image; PROCESS_ROLE
# selects behavior (ADR-041). For a single-process setup, set the api's
# PROCESS_ROLE=all and drop the worker service.

# Shared backend env for `api` + `worker` (the `web` compose service is the
# Next.js frontend — unrelated to the backend `web` role).
x-app-env: &app-env
  NODE_ENV: ${NODE_ENV:-development}
  API_PORT: 5002
  # COMPOSE_* are decoupled from the host DATABASE_URL/REDIS_URL (which are for
  # `pnpm dev`), so a host `.env` can never poison the container config. Unset →
  # bundled services; set COMPOSE_DATABASE_URL/COMPOSE_REDIS_URL for managed DB/Redis.
  DATABASE_URL: ${COMPOSE_DATABASE_URL:-postgresql://amcore:amcore@postgres:5432/amcore}
  REDIS_URL: ${COMPOSE_REDIS_URL:-redis://redis:6379}
  WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-1}
  # Dev-only secret; production requires a real value >= 32 chars (ADR-029/040).
  JWT_SECRET: ${JWT_SECRET:-dev-only-jwt-secret-min-32-characters-change-me}
  # Storage: local by default; set STORAGE_DRIVER=s3 + the vars below for real S3.
  STORAGE_DRIVER: ${STORAGE_DRIVER:-local}
  STORAGE_LOCAL_ROOT: ${STORAGE_LOCAL_ROOT:-/app/uploads}
  STORAGE_ENDPOINT: ${STORAGE_ENDPOINT:-}
  STORAGE_PUBLIC_ENDPOINT: ${STORAGE_PUBLIC_ENDPOINT:-}
  STORAGE_REGION: ${STORAGE_REGION:-us-east-1}
  STORAGE_BUCKET: ${STORAGE_BUCKET:-}
  STORAGE_ACCESS_KEY_ID: ${STORAGE_ACCESS_KEY_ID:-}
  STORAGE_SECRET_ACCESS_KEY: ${STORAGE_SECRET_ACCESS_KEY:-}
  # Realtime notifications (ADR-053). Forwarded to BOTH api (web) and worker via
  # this anchor so they resolve the SAME channel namespace. Set NAMESPACE per
  # deployment when several share one Redis (staging != production); the rest fall
  # back to the env.ts defaults unless an operator overrides them.
  NOTIFICATIONS_REALTIME_NAMESPACE: ${NOTIFICATIONS_REALTIME_NAMESPACE:-}
  NOTIFICATIONS_REALTIME_HEARTBEAT_MS: ${NOTIFICATIONS_REALTIME_HEARTBEAT_MS:-20000}
  NOTIFICATIONS_REALTIME_MAX_PER_USER: ${NOTIFICATIONS_REALTIME_MAX_PER_USER:-5}
  NOTIFICATIONS_REALTIME_MAX_CONNECTIONS: ${NOTIFICATIONS_REALTIME_MAX_CONNECTIONS:-10000}
  NOTIFICATIONS_REALTIME_QUEUE_DEPTH: ${NOTIFICATIONS_REALTIME_QUEUE_DEPTH:-16}
  NOTIFICATIONS_REALTIME_MAX_STREAM_LIFETIME_MS: ${NOTIFICATIONS_REALTIME_MAX_STREAM_LIFETIME_MS:-3600000}
  NOTIFICATIONS_REALTIME_PUBLISH_TIMEOUT_MS: ${NOTIFICATIONS_REALTIME_PUBLISH_TIMEOUT_MS:-1000}
  NOTIFICATIONS_REALTIME_MAX_INFLIGHT_PUBLISH: ${NOTIFICATIONS_REALTIME_MAX_INFLIGHT_PUBLISH:-1000}

# Health-only Node fetch check (node:22-slim has no wget/curl). Readiness, so
# web waits for DB/Redis to be usable; the worker uses it for liveness too.
x-health-ready: &health-ready
  test:
    - CMD
    - node
    - -e
    - "fetch('http://localhost:5002/api/v1/health/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 20s

services:
  # ---------------------------------------------------------------------------
  # Bundled infra — OPTIONAL, only with COMPOSE_PROFILES=local-infra.
  # Skip these (empty COMPOSE_PROFILES) when using a managed/VPS DB or Redis.
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    profiles: ['local-infra']
    environment:
      POSTGRES_USER: amcore
      POSTGRES_PASSWORD: amcore
      POSTGRES_DB: amcore
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U amcore -d amcore']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    profiles: ['local-infra']
    # noeviction is mandatory for BullMQ (the only policy that keeps queues
    # correct — BullMQ docs); appendonly (AOF) persists jobs across restarts.
    command: redis-server --appendonly yes --maxmemory-policy noeviction
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # One-shot migration step (ADR-040/058): runs `migrate deploy` once, BEFORE api/web.
  # This uses the CLI-capable migrator target; the app runtime image is CLI-free.
  # Uses MIGRATION_DATABASE_URL (direct connection) when set, else DATABASE_URL.
  # `required:false` lets it wait for bundled Postgres when present and skip it
  # when using a remote DB. Rerun it on upgrades before recreating api/web.
  # ---------------------------------------------------------------------------
  migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: migrator
    environment:
      DATABASE_URL: ${MIGRATION_DATABASE_URL:-${COMPOSE_DATABASE_URL:-postgresql://amcore:amcore@postgres:5432/amcore}}
    depends_on:
      postgres:
        condition: service_healthy
        required: false
    restart: 'no'

  # API (web role): HTTP only, enqueues jobs. PROCESS_ROLE=web → no processors/cron.
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - '5002:5002'
    environment:
      <<: *app-env
      PROCESS_ROLE: web
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
        required: false
      redis:
        condition: service_healthy
        required: false
    healthcheck: *health-ready

  # Worker role: BullMQ processors + cron, health-only HTTP (no published port —
  # avoids the api's 5002; k8s probes the pod directly). PROCESS_ROLE=worker.
  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      <<: *app-env
      PROCESS_ROLE: worker
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
        required: false
      redis:
        condition: service_healthy
        required: false
    healthcheck: *health-ready

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      API_URL: ${API_URL:-http://api:5002}
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
